<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="background-color: #212121;color: #fff;">
    <ul class="language">
        <li>JavaScript</li>
    </ul>
</body>
<script>
    function addLanuage(langName){
        const li = document.createElement("li")
        li.innerHTML= `${langName}`
        document.querySelector(".language").
        appendChild(li)
    }
    addLanuage("HTML")
    addLanuage("CSS")
    addLanuage("Frontend")

    function addOptiLang(lang){
        const li = document.createElement("li");
        li.appendChild(document.createTextNode(lang))
        document.querySelector(".language").appendChild(li)

    li.style.color="red"
    }
    addOptiLang("Mayank")
    addOptiLang("Mayank")
    // Edit----------

    const secLang = document.querySelector("li:nth-child(2)")
    const newLi = document.createElement("li")
    newLi.textContent= "riya"
    secLang.replaceWith(newLi)

    const erLang = document.querySelector("li:nth-child(3)")
    const nL = document.createElement("li")
    nL.textContent= "shweta"
    erLang.replaceWith(nL)

    const update = document.querySelector("li:first-child")
    update.outerHTML = "<li>Classmate</li>"

    // Remove--------------------

    const lastLang = document.querySelector("li:nth-child(4)")
    lastLang.remove()
</script>
</html>
